name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Go API
  # ============================================================================
  test-go:
    name: Go API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go-api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./go-api/coverage.out
          flags: go-api
        continue-on-error: true

  # ============================================================================
  # Rust (collector + engine)
  # ============================================================================
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test rust-collector
        run: cd rust-collector && cargo test --verbose

      - name: Clippy rust-collector
        run: cd rust-collector && cargo clippy -- -D warnings

      - name: Test engine-server
        run: cd engine-server && cargo test --verbose

      - name: Clippy engine-server
        run: cd engine-server && cargo clippy -- -D warnings

  # ============================================================================
  # Tauri shell (frontend + Rust shell)
  # ============================================================================
  build-tauri:
    name: Build Tauri Shell
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ./tauri-shell

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tauri-shell/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-shell/src-tauri

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: tauri-shell/src-tauri/target/release/bundle/
          retention-days: 30

  # ============================================================================
  # Security
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit (Rust deps)
        run: |
          cargo install cargo-audit --locked
          cd engine-server && cargo audit
          cd ../rust-collector && cargo audit
        continue-on-error: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Gosec (Go security)
        uses: securego/gosec@master
        with:
          args: './go-api/...'
        continue-on-error: true

  # ============================================================================
  # Release
  # ============================================================================
  deploy:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [test-go, test-rust, build-tauri]
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri-ubuntu-latest/**
            tauri-windows-latest/**
            tauri-macos-latest/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
