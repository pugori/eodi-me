name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate updater pubkey is set
        shell: pwsh
        run: |
          $conf = Get-Content tauri-shell/src-tauri/tauri.conf.json | ConvertFrom-Json
          $pubkey = $conf.tauri.updater.pubkey
          if ($pubkey -like "REPLACE_WITH*" -or $pubkey -eq "" -or $null -eq $pubkey) {
            Write-Error "tauri.conf.json: updater.pubkey is still a placeholder."
            exit 1
          }
          Write-Host "Updater pubkey OK."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-shell/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-shell/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: tauri-shell
        run: npm ci

      - name: Build Tauri app
        working-directory: tauri-shell
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            tauri-shell/src-tauri/target/release/bundle/msi/*.msi
            tauri-shell/src-tauri/target/release/bundle/nsis/*.exe
            tauri-shell/src-tauri/target/release/bundle/nsis/*.nsis.zip
            tauri-shell/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 1

  publish-release:
    name: Publish to eodi-me/app
    runs-on: ubuntu-latest
    needs: [build-tauri]
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Publish release to eodi-me/app
        uses: softprops/action-gh-release@v2
        with:
          repository: eodi-me/app
          tag_name: ${{ github.ref_name }}
          name: eodi.me ${{ github.ref_name }}
          body: |
            ## eodi.me ${{ github.ref_name }}

            ### 다운로드

            | 플랫폼 | 파일 |
            |--------|------|
            | Windows (설치 프로그램) | `eodi-me_*_x64-setup.exe` |
            | Windows (MSI) | `eodi-me_*_x64_en-US.msi` |

            ---
            변경 사항은 [CHANGELOG.md](https://github.com/eodi-me/app/blob/main/CHANGELOG.md) 참조
          files: dist/windows/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          SIG_FILE=$(find dist/windows -name "*.nsis.zip.sig" | head -1)
          ZIP_FILE=$(find dist/windows -name "*.nsis.zip" | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$ZIP_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            ZIP_NAME=$(basename "$ZIP_FILE")
            ZIP_URL="https://github.com/eodi-me/app/releases/download/${VERSION}/${ZIP_NAME}"
            PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            cat > dist/latest.json <<EOF
          {
            "version": "${VERSION_NUM}",
            "notes": "See https://github.com/eodi-me/app/releases/tag/${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "${ZIP_URL}"
              }
            }
          }
          EOF
            echo "Generated latest.json for ${VERSION_NUM}"
          else
            echo "WARNING: .nsis.zip.sig not found — skipping latest.json"
          fi

      - name: Upload latest.json to eodi-me/app release
        if: ${{ hashFiles('dist/latest.json') != '' }}
        uses: softprops/action-gh-release@v2
        with:
          repository: eodi-me/app
          tag_name: ${{ github.ref_name }}
          files: dist/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

