<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: dark navy rounded rect -->
  <rect width="512" height="512" rx="96" fill="#080e1a"/>

  <!-- Accent ring — subtle glow border -->
  <rect x="4" y="4" width="504" height="504" rx="94"
        fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.4"/>

  <defs>
    <!-- Primary gradient: blue → teal (brand colors) -->
    <linearGradient id="txt" x1="80" y1="160" x2="432" y2="380"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#6496ff"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <!-- Ring gradient -->
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#6496ff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Wordmark: "eodi" on line 1, ".me" on line 2 -->
  <!-- Line 1: "eodi" -->
  <text x="256" y="270"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="900"
        font-size="168"
        letter-spacing="-8"
        fill="url(#txt)">eodi</text>

  <!-- Line 2: ".me" — smaller, accent color only -->
  <text x="256" y="390"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="900"
        font-size="100"
        letter-spacing="-4"
        fill="#6496ff"
        opacity="0.75">.me</text>
</svg>
