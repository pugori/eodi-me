# 비공개 모노레포 → .github/workflows/release.yml 로 복사
# 태그(v*) push 시 빌드 후 eodi-me/app 에 릴리즈 게시
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tauri-shell/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-shell/src-tauri

      - name: Install npm deps
        working-directory: tauri-shell
        run: npm ci

      - name: Build Tauri (Windows)
        working-directory: tauri-shell
        run: npm run tauri:build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            tauri-shell/src-tauri/target/release/bundle/msi/*.msi
            tauri-shell/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tauri-shell/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-shell/src-tauri

      - name: Install npm deps
        working-directory: tauri-shell
        run: npm ci

      - name: Build Tauri (macOS universal)
        working-directory: tauri-shell
        run: npm run tauri:build -- --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: tauri-shell/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 1

  release:
    name: Publish to eodi-me/app
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos

      - name: Publish release to eodi-me/app
        uses: softprops/action-gh-release@v2
        with:
          repository: eodi-me/app
          tag_name: ${{ github.ref_name }}
          name: eodi.me ${{ github.ref_name }}
          body: |
            ## eodi.me ${{ github.ref_name }}

            ### 다운로드

            | 플랫폼 | 파일 |
            |--------|------|
            | Windows (설치 프로그램) | `eodi-me_*_x64-setup.exe` |
            | Windows (MSI) | `eodi-me_*_x64_en-US.msi` |
            | macOS (Universal) | `eodi-me_*.dmg` |

            ### 설치 방법
            - **Windows**: `.exe` 설치 프로그램 실행
            - **macOS**: `.dmg` 파일 열고 Applications로 드래그

            ---
            변경 사항은 [CHANGELOG.md](https://github.com/eodi-me/app/blob/main/CHANGELOG.md) 참조
          files: |
            dist/windows/**
            dist/macos/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
