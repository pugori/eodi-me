groups:
  - name: eodi_alerts
    interval: 30s
    rules:
      # API Server Alerts
      - alert: APIServerDown
        expr: up{job="eodi-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EODI API Server is down"
          description: "API Server {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(eodi_api_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} requests/sec on {{ $labels.instance }}."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(eodi_api_http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "95th percentile latency is {{ $value }}s on {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB on {{ $labels.instance }}."

      - alert: HighEngineLookupErrors
        expr: rate(eodi_engine_lookup_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High engine lookup error rate"
          description: "Engine lookup errors at {{ $value }}/sec on {{ $labels.instance }}."
